<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Assistant India — Your Interactive Voting Guide</title>
    <meta name="description"
        content="AI-powered interactive Election Assistant to help Indian citizens understand eligibility, voter registration, documents, polling booths, and the voting process step by step.">
    <meta name="theme-color" content="#f8fafc">
    <link rel="manifest" href="manifest.json">
    <link rel="canonical" href="https://election-assistant.india">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://maps.googleapis.com https://www.gstatic.com https://apis.google.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: https://unpkg.com https://*.openstreetmap.org https://*.googleapis.com https://*.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com; base-uri 'self'; object-src 'none'; upgrade-insecure-requests;">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗳️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Leaflet Maps API CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css">
</head>

<body class="light-theme">
    <!-- Skip Navigation for Accessibility -->
    <a href="#main-content" class="skip-link" data-i18n="a11y.skipLink">Skip to main content</a>

    <!-- Background Particles -->
    <div class="bg-particles" id="bgParticles" aria-hidden="true"></div>

    <!-- Top Navigation Bar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <a href="#/" class="nav-brand" aria-label="Election Assistant Home">
                <div class="brand-logo">
                    <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
                        <circle cx="20" cy="20" r="18" stroke="url(#navGrad)" stroke-width="2.5" fill="none" />
                        <path d="M20 8L23 16H17L20 8Z" fill="#FF9933" />
                        <rect x="17.5" y="16" width="5" height="6" rx="1" fill="#fff" />
                        <circle cx="20" cy="19" r="1.5" fill="#000088" />
                        <path d="M17 22H23L20 28L17 22Z" fill="#138808" />
                        <defs>
                            <linearGradient id="navGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#FF9933" />
                                <stop offset="50%" stop-color="#fff" />
                                <stop offset="100%" stop-color="#138808" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="brand-text">Election<strong>Assistant</strong></span>
            </a>

            <div class="nav-links" id="navLinks" role="menubar">
                <a href="#/" class="nav-link active" data-i18n="nav.home" role="menuitem">Home</a>
                <a href="#/guide" class="nav-link" data-i18n="nav.guide" role="menuitem">Guide</a>
                <a href="#/chat" class="nav-link" data-i18n="nav.chat" role="menuitem">Chat</a>
                <a href="#/timeline" class="nav-link" data-i18n="nav.timeline" role="menuitem">Timeline</a>
                <a href="#/polling" class="nav-link" data-i18n="nav.polling" role="menuitem">Find Booth</a>
                <a href="#/quiz" class="nav-link" data-i18n="nav.quiz" role="menuitem">Quiz</a>
            </div>

            <div class="nav-actions">
                <button id="langToggle" class="nav-action-btn" aria-label="Switch to Hindi"
                    data-i18n-label="a11y.langSwitch" title="Switch Language">हिं</button>
                <button id="themeToggle" class="nav-action-btn" aria-label="Toggle dark/light theme"
                    data-i18n-label="a11y.themeToggle" title="Toggle Theme">☀️</button>
                <button id="profileBtn" class="nav-action-btn profile-btn" aria-label="Set up profile" title="Profile">
                    <span class="profile-avatar">👤</span> Profile
                </button>
            </div>

            <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
        <div id="app-content" class="app-content" role="region" aria-live="polite">
            <!-- Views render here via router -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer" role="contentinfo">
        <div class="footer-inner">
            <div class="footer-brand">
                <span>🇮🇳</span> Election Assistant — <span data-i18n="app.subtitle">Your Voting Guide for India</span>
            </div>
            <p class="footer-disclaimer" data-i18n="footer.disclaimer">
                This tool provides general guidance based on ECI guidelines.
            </p>
            <p class="footer-links">
                <span data-i18n="footer.official">For official information, visit</span>
                <a href="https://www.eci.gov.in" target="_blank" rel="noopener noreferrer">eci.gov.in</a> •
                <a href="https://voters.eci.gov.in" target="_blank" rel="noopener noreferrer">voters.eci.gov.in</a>
            </p>
        </div>
    </footer>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profile-modal" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="profile-modal-title" data-i18n="profile.title">Set Up Profile</h2>
                <button class="modal-close" data-close-modal="profile-modal" aria-label="Close">&times;</button>
            </div>
            <form class="modal-body" id="profileForm">
                <div class="form-group">
                    <label for="profileName" data-i18n="profile.name">Your Name</label>
                    <input type="text" id="profileName" placeholder="e.g., Priya" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="profileAge" data-i18n="profile.age">Your Age</label>
                    <input type="number" id="profileAge" placeholder="e.g., 21" min="10" max="120" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="profileState" data-i18n="profile.state">Your State</label>
                    <select id="profileState">
                        <option value="">Select your state</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="profile.firstTime">First-time voter?</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="firstTime" value="yes"><span
                                class="radio-custom"></span> <span data-i18n="profile.yes">Yes</span></label>
                        <label class="radio-label"><input type="radio" name="firstTime" value="no"><span
                                class="radio-custom"></span> <span data-i18n="profile.no">No</span></label>
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="profile.registered">Already registered?</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="registered" value="yes"><span
                                class="radio-custom"></span> <span data-i18n="profile.yes">Yes</span></label>
                        <label class="radio-label"><input type="radio" name="registered" value="no"><span
                                class="radio-custom"></span> <span data-i18n="profile.no">No</span></label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" data-i18n="profile.save">Save Profile</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- Leaflet Maps API Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous" defer></script>
    <!-- App Entry Point -->
    <script type="module" src="js/app.js" defer></script>
</body>

</html>
